name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — Lint, Typecheck & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-ts/package-lock.json

      - name: Install backend dependencies
        working-directory: backend-ts
        run: npm ci

      - name: Run ESLint
        working-directory: backend-ts
        run: npm run lint

      - name: TypeScript type check
        working-directory: backend-ts
        run: npm run typecheck

      - name: Run unit tests
        working-directory: backend-ts
        run: npm run test:unit
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_for_ci

      - name: Run integration tests
        working-directory: backend-ts
        run: npm run test:integration
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_for_ci
          MONGO_URI: mongodb://localhost:27017/rawmart_test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend-ts/coverage/

  frontend:
    name: Frontend — Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci
        env:
          CI: true

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          CI: false
          REACT_APP_API_URL: /api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/