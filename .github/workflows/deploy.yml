name: Deploy to AWS EC2

on:
  push:
    branches: [main]  # Only deploy when code merges to main

jobs:
  deploy:
    name: Deploy to Production EC2
    runs-on: ubuntu-latest
    needs: []  # Add 'backend' and 'frontend' job names from ci.yml if you want deploy only after CI passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}           # EC2 public IP or domain
          username: ${{ secrets.EC2_USER }}        # e.g., ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}          # Private key (PEM contents)
          port: 22
          script: |
            echo "=== Starting RawMart Deployment ==="
            
            # Navigate to project directory (idempotent - -p means no error if exists)
            mkdir -p /home/ubuntu/rawmart
            cd /home/ubuntu/rawmart
            
            # Pull latest code
            git pull origin main
            
            # Install backend dependencies (ci = clean install, faster in CI)
            cd backend-ts
            npm ci --production
            
            # Compile TypeScript to JavaScript
            npm run build
            
            # Restart app with PM2 (starts if not running, restarts if running)
            pm2 describe rawmart > /dev/null 2>&1 && pm2 restart rawmart || pm2 start dist/app.js --name rawmart
            
            # Save PM2 process list (survives server reboots)
            pm2 save
            
            echo "=== Deployment Complete ==="
            pm2 status rawmart